# Config for GWM-RNN-Text
pretrained_model: bert-base-uncased
finetune_text_encoder: false
num_layers: 2
hidden_dim: 1024
structural_dim: 1024
fusion_mode: gated
dropout: 0.2
learning_rate: 1e-4
batch_size: 1024
loss: infonce
num_epochs: 10
temperature: 0.07

data_dir: data-processed/wn18rr
output_dir: output/wn18rr_bert_finetune
    
add_inverse: true
context_k: 15
context_agg: mean
early_stopping: 3
eval_every: 1
    
device: cuda
seed: 42

text_cache_batch_size: 128

eval_batch_size: 1024
candidate_batch_size: 1024

max_length: 512